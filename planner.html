<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRIDGE Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const statusColors = {
  'Pending':     { bg: '#f1f5f9', text: '#475569', border: '#cbd5e1', dot: '#94a3b8' },
  'Arriving':    { bg: '#dbeafe', text: '#1e40af', border: '#93c5fd', dot: '#3b82f6' },
  'In Progress': { bg: '#fef3c7', text: '#92400e', border: '#fcd34d', dot: '#f59e0b' },
  'Planned':     { bg: '#ede9fe', text: '#5b21b6', border: '#c4b5fd', dot: '#8b5cf6' },
  'Completed':   { bg: '#d1fae5', text: '#065f46', border: '#6ee7b7', dot: '#10b981' },
};

const priorityColors = {
  'Low':    { bg: '#d1fae5', text: '#065f46', border: '#6ee7b7', dot: '#10b981' },
  'Medium': { bg: '#dbeafe', text: '#1e40af', border: '#93c5fd', dot: '#3b82f6' },
  'High':   { bg: '#ffedd5', text: '#9a3412', border: '#fdba74', dot: '#f97316' },
  'Urgent': { bg: '#fee2e2', text: '#991b1b', border: '#fca5a5', dot: '#ef4444' },
};

const defaultTasks = [
  { id: 1, category: 'Amazon Delivery', task: 'Nilight 50029R 120 Pcs Standard Blade Fuse Assorted Set with 10 Pack 14AWG ATC/ATO Inline Holder', source: 'Amazon', startDate: '', dueDate: '2026-04-21', timeZone: 'Emirates Time', status: 'Arriving', priority: 'Medium', notes: 'Return eligible through 4 May 2026' },
  { id: 2, category: 'Amazon Delivery', task: 'TUOFENG 16 AWG Electrical Wire 3m [1.5m Black and 1.5m Red]', source: 'Amazon', startDate: '', dueDate: '2026-04-21', timeZone: 'Emirates Time', status: 'Arriving', priority: 'Medium', notes: 'Return eligible through 4 May 2026' },
  { id: 3, category: 'Amazon Delivery', task: 'DROK Buck Converter 12v to 5v Voltage Regulator Board', source: 'Amazon', startDate: '', dueDate: '2026-04-21', timeZone: 'Emirates Time', status: 'Arriving', priority: 'Medium', notes: 'Return eligible through 4 May 2026' },
  { id: 4, category: 'Amazon Delivery', task: 'Fancasee Replacement 5.5mm x 2.5mm 90 Degree Right Angle DC Power Male Plug Jack to Bare Wire Cable', source: 'Amazon', startDate: '', dueDate: '2026-04-21', timeZone: 'Emirates Time', status: 'Arriving', priority: 'Medium', notes: 'Return eligible through 4 May 2026' },
  { id: 5, category: 'Amazon Delivery', task: 'NVIDIA Jetson Orin Nano Developer Kit', source: 'Amazon', startDate: '', dueDate: '2026-04-18', timeZone: 'Emirates Time', status: 'Arriving', priority: 'High', notes: 'Return eligible through 2 May 2026' },
  { id: 6, category: 'Amazon Delivery', task: 'Comidox USB Logic Analyzer Device Set USB Cable 24MHz 8CH UART IIC SPI Debug', source: 'Amazon', startDate: '', dueDate: '2026-04-18', timeZone: 'Emirates Time', status: 'Arriving', priority: 'High', notes: 'No return date shown in screenshot' },
  { id: 7, category: 'Project', task: 'Build and integrate everything for GuideBot - BRIDGE', source: 'Project', startDate: '', dueDate: '2026-04-21', timeZone: 'Emirates Time', status: 'Pending', priority: 'Urgent', notes: 'Final integration deadline' },
  { id: 8, category: 'Reminder Window', task: 'Emirates reminder period', source: 'Personal', startDate: '2026-05-04', dueDate: '2026-05-07', timeZone: 'Emirates Time', status: 'Planned', priority: 'Medium', notes: 'Reminder window from 4 May to 7 May' },
];

const STORAGE_KEY = 'planner_tasks_v1';

function loadTasks() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return defaultTasks;
}

function saveTasks(tasks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function formatDateDisplay(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function processTask(item) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const due = new Date(item.dueDate + 'T00:00:00');
  const diffTime = due - today;
  const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

  let reminderLevel = '', formatColor = '', badgeColor = '';

  if (item.status === 'Completed') {
    reminderLevel = 'Completed';
    formatColor = 'bg-emerald-50 text-emerald-900 border-emerald-200';
    badgeColor = 'bg-emerald-100 text-emerald-800';
  } else if (daysLeft < 0 || item.priority === 'Urgent') {
    reminderLevel = daysLeft < 0 ? 'Overdue' : 'Urgent';
    formatColor = 'bg-red-50 text-red-900 border-red-200';
    badgeColor = 'bg-red-100 text-red-800';
  } else if (daysLeft <= 3) {
    reminderLevel = 'Soon';
    formatColor = 'bg-orange-50 text-orange-900 border-orange-200';
    badgeColor = 'bg-orange-100 text-orange-800';
  } else if (daysLeft <= 7) {
    reminderLevel = 'Upcoming';
    formatColor = 'bg-yellow-50 text-yellow-900 border-yellow-200';
    badgeColor = 'bg-yellow-100 text-yellow-800';
  } else {
    reminderLevel = 'On Track';
    formatColor = 'bg-green-50 text-green-900 border-green-200';
    badgeColor = 'bg-green-100 text-green-800';
  }

  return { ...item, daysLeft, reminderLevel, formatColor, badgeColor };
}

/* ---- Modal for Add / Edit ---- */
function TaskModal({ task, onSave, onClose }) {
  const [form, setForm] = useState(task || {
    category: 'Amazon Delivery', task: '', source: 'Amazon', startDate: '', dueDate: '', timeZone: 'Emirates Time', status: 'Pending', priority: 'Medium', notes: ''
  });

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden" onClick={e => e.stopPropagation()}>
        <div className="bg-[#ff5622] px-6 py-4">
          <h2 className="text-lg font-bold text-white">{task ? 'Edit Task' : 'Add New Task'}</h2>
        </div>
        <div className="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
          {/* Task Name */}
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1">Task / Item *</label>
            <input value={form.task} onChange={e => set('task', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#ff5622]" placeholder="Enter task name..." />
          </div>

          <div className="grid grid-cols-2 gap-4">
            {/* Category */}
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Category</label>
              <select value={form.category} onChange={e => set('category', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#ff5622]">
                <option>Amazon Delivery</option>
                <option>Project</option>
                <option>Reminder Window</option>
                <option>Personal</option>
              </select>
            </div>
            {/* Source */}
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">What is it?</label>
              <input value={form.source} onChange={e => set('source', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#ff5622]" />
            </div>
          </div>

          <div className="grid grid-cols-2 gap-4">
            {/* Start Date */}
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Start Date</label>
              <input type="date" value={form.startDate} onChange={e => set('startDate', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#ff5622]" />
            </div>
            {/* Due Date */}
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Due / Arrival Date *</label>
              <input type="date" value={form.dueDate} onChange={e => set('dueDate', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#ff5622]" />
            </div>
          </div>

          <div className="grid grid-cols-3 gap-4">
            {/* Status */}
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Status</label>
              <select value={form.status} onChange={e => set('status', e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#ff5622]" style={{ backgroundColor: statusColors[form.status]?.bg, color: statusColors[form.status]?.text, borderWidth: '1.5px', borderColor: statusColors[form.status]?.border }}>
                {Object.keys(statusColors).map(s => (
                  <option key={s} value={s} style={{ backgroundColor: statusColors[s].bg, color: statusColors[s].text }}>{s}</option>
                ))}
              </select>
            </div>
            {/* Priority */}
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Priority</label>
              <select value={form.priority} onChange={e => set('priority', e.target.value)} className="w-full rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-[#ff5622]" style={{ backgroundColor: priorityColors[form.priority]?.bg, color: priorityColors[form.priority]?.text, borderWidth: '1.5px', borderColor: priorityColors[form.priority]?.border }}>
                {Object.keys(priorityColors).map(p => (
                  <option key={p} value={p} style={{ backgroundColor: priorityColors[p].bg, color: priorityColors[p].text }}>{p}</option>
                ))}
              </select>
            </div>
            {/* Time Zone */}
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">Time Zone</label>
              <input value={form.timeZone} onChange={e => set('timeZone', e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#ff5622]" />
            </div>
          </div>

          {/* Notes */}
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1">Notes</label>
            <textarea value={form.notes} onChange={e => set('notes', e.target.value)} rows={2} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#ff5622]" placeholder="Optional notes..." />
          </div>
        </div>

        <div className="flex justify-end gap-3 px-6 py-4 bg-slate-50 border-t border-slate-200">
          <button onClick={onClose} className="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-100 transition-colors">Cancel</button>
          <button
            onClick={() => {
              if (!form.task.trim() || !form.dueDate) return alert('Task name and Due Date are required.');
              onSave(form);
            }}
            className="px-4 py-2 text-sm font-medium text-white bg-[#ff5622] rounded-lg hover:bg-[#e04d1e] transition-colors shadow-sm"
          >
            {task ? 'Save Changes' : 'Add Task'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---- Delete Confirmation ---- */
function DeleteModal({ taskName, onConfirm, onClose }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4" onClick={e => e.stopPropagation()}>
        <div className="p-6 text-center">
          <div className="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4 text-2xl">&#9888;</div>
          <h3 className="text-lg font-bold text-slate-900 mb-2">Delete Task?</h3>
          <p className="text-sm text-slate-500 mb-6">"{taskName}" will be permanently removed.</p>
          <div className="flex gap-3 justify-center">
            <button onClick={onClose} className="px-4 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-100">Cancel</button>
            <button onClick={onConfirm} className="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700">Delete</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---- Toast Notification ---- */
function Toast({ message, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return (
    <div className="fixed bottom-6 right-6 z-50 bg-[#434B51] text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium animate-bounce">
      {message}
    </div>
  );
}

/* ---- Main App ---- */
function App() {
  const [tasks, setTasks] = useState(loadTasks);
  const [activeTab, setActiveTab] = useState('tracker');
  const [filterCategory, setFilterCategory] = useState('All');
  const [modal, setModal] = useState(null);       // null | 'add' | task object
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [toast, setToast] = useState('');

  // Persist on change
  useEffect(() => { saveTasks(tasks); }, [tasks]);

  const nextId = () => (tasks.length ? Math.max(...tasks.map(t => t.id)) + 1 : 1);

  const addTask = (form) => {
    setTasks(prev => [...prev, { ...form, id: nextId() }]);
    setModal(null);
    setToast('Task added!');
  };

  const updateTask = (form) => {
    setTasks(prev => prev.map(t => t.id === form.id ? { ...form } : t));
    setModal(null);
    setToast('Task updated!');
  };

  const deleteTask = (id) => {
    setTasks(prev => prev.filter(t => t.id !== id));
    setDeleteTarget(null);
    setToast('Task deleted!');
  };

  const resetToDefaults = () => {
    if (confirm('Reset all tasks to defaults? Your changes will be lost.')) {
      setTasks(defaultTasks);
      setToast('Reset to defaults!');
    }
  };

  const today = new Date();
  today.setHours(0,0,0,0);
  const todayStr = today.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

  const processedData = useMemo(() => tasks.map(processTask), [tasks]);

  const filteredData = useMemo(() => {
    if (filterCategory === 'All') return processedData;
    return processedData.filter(d => d.category === filterCategory);
  }, [processedData, filterCategory]);

  const categories = ['All', ...new Set(processedData.map(d => d.category))];

  /* ---- Export to Excel (.xlsx) ---- */
  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    const ws = {};

    const headers = ['#', 'Category', 'Task / Item', 'Source', 'Start Date', 'Due / Arrival Date', 'Time Zone', 'Status', 'Priority', 'Days Left', 'Reminder Level', 'Notes'];
    const colWidths = [4, 18, 50, 10, 14, 20, 16, 12, 12, 12, 16, 40];

    // Row format colors by reminder level
    const rowFmts = {
      'Overdue':   { bg: 'FEF2F2', fg: '7F1D1D', border: 'FECACA' },
      'Urgent':    { bg: 'FEF2F2', fg: '7F1D1D', border: 'FECACA' },
      'Soon':      { bg: 'FFF7ED', fg: '7C2D12', border: 'FED7AA' },
      'Upcoming':  { bg: 'FEFCE8', fg: '713F12', border: 'FEF08A' },
      'On Track':  { bg: 'F0FDF4', fg: '14532D', border: 'BBF7D0' },
      'Completed': { bg: 'ECFDF5', fg: '064E3B', border: 'A7F3D0' },
    };
    const dlFmts = {
      'Overdue': 'EF4444', 'Urgent': 'EF4444', 'Soon': 'F97316',
      'Upcoming': 'EAB308', 'On Track': '22C55E', 'Completed': '10B981',
    };
    const priFmts = { 'Urgent': 'DC2626', 'High': 'F97316', 'Medium': '3B82F6', 'Low': '22C55E' };

    const cell = (r, c) => XLSX.utils.encode_cell({ r, c });
    const border = (color) => ({ top: { style: 'thin', color: { rgb: color } }, bottom: { style: 'thin', color: { rgb: color } }, left: { style: 'thin', color: { rgb: color } }, right: { style: 'thin', color: { rgb: color } } });

    // Row 0: Title (merged)
    ws[cell(0, 0)] = { v: 'Delivery and Project Reminder Tracker', s: { font: { bold: true, sz: 18, color: { rgb: '1E293B' } }, border: { bottom: { style: 'medium', color: { rgb: '6366F1' } } } } };
    ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 11 } }];

    // Row 1: Subtitle (merged)
    ws[cell(1, 0)] = { v: `Emirates Time  |  Generated: ${todayStr}`, s: { font: { sz: 11, italic: true, color: { rgb: '64748B' } } } };
    ws['!merges'].push({ s: { r: 1, c: 0 }, e: { r: 1, c: 11 } });

    // Row 2: empty spacer

    // Row 3: Headers
    const headerStyle = { font: { bold: true, sz: 11, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: '1E293B' } }, alignment: { horizontal: 'center', vertical: 'center', wrapText: true }, border: border('334155') };
    headers.forEach((h, c) => { ws[cell(3, c)] = { v: h, s: headerStyle }; });

    // Data rows (starting row 4)
    processedData.forEach((d, i) => {
      const r = 4 + i;
      const level = d.reminderLevel;
      const rf = rowFmts[level] || rowFmts['On Track'];
      const baseStyle = { font: { color: { rgb: rf.fg } }, fill: { fgColor: { rgb: rf.bg } }, alignment: { vertical: 'center', wrapText: true }, border: border(rf.border) };

      const vals = [i + 1, d.category, d.task, d.source, formatDateDisplay(d.startDate), formatDateDisplay(d.dueDate), d.timeZone, d.status, d.priority, d.daysLeft, d.reminderLevel, d.notes];

      vals.forEach((v, c) => {
        let s = { ...baseStyle };
        // Priority column (8) - special color
        if (c === 8) {
          const pbg = priFmts[d.priority] || '3B82F6';
          s = { font: { bold: true, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: pbg } }, alignment: { horizontal: 'center', vertical: 'center' }, border: border(rf.border) };
        }
        // Days Left column (9) - special color
        if (c === 9) {
          const dlbg = dlFmts[level] || '22C55E';
          s = { font: { bold: true, color: { rgb: 'FFFFFF' } }, fill: { fgColor: { rgb: dlbg } }, alignment: { horizontal: 'center', vertical: 'center' }, border: border(rf.border) };
        }
        ws[cell(r, c)] = { v: v, t: (typeof v === 'number' ? 'n' : 's'), s };
      });
    });

    // Color Legend
    const legendRow = 4 + processedData.length + 2;
    ws[cell(legendRow, 0)] = { v: 'Color Legend', s: { font: { bold: true, sz: 13, color: { rgb: '1E293B' } }, border: { bottom: { style: 'thin', color: { rgb: '1E293B' } } } } };
    ws['!merges'].push({ s: { r: legendRow, c: 0 }, e: { r: legendRow, c: 3 } });

    const legendItems = [
      ['Overdue / Urgent', 'EF4444'], ['Soon (<= 3 Days)', 'F97316'],
      ['Upcoming (<= 7 Days)', 'EAB308'], ['On Track / Ahead', '22C55E'], ['Completed', '10B981'],
    ];
    legendItems.forEach(([label, bg], j) => {
      const r = legendRow + 1 + j;
      ws[cell(r, 0)] = { v: '', s: { fill: { fgColor: { rgb: bg } }, border: border('000000') } };
      ws[cell(r, 1)] = { v: label, s: { font: { sz: 11 }, alignment: { vertical: 'center' } } };
      ws['!merges'].push({ s: { r, c: 1 }, e: { r, c: 3 } });
    });

    // Column widths
    ws['!cols'] = colWidths.map(w => ({ wch: w }));

    // Row heights for data rows
    const rowInfo = {};
    for (let i = 0; i < processedData.length; i++) { rowInfo[4 + i] = { hpt: 25 }; }
    ws['!rows'] = [];
    for (let i = 0; i <= legendRow + legendItems.length; i++) { ws['!rows'][i] = rowInfo[i] || {}; }

    // Set the range
    const lastRow = legendRow + legendItems.length;
    ws['!ref'] = `A1:L${lastRow + 1}`;

    // Autofilter
    ws['!autofilter'] = { ref: `A4:L${4 + processedData.length}` };

    XLSX.utils.book_append_sheet(wb, ws, 'Tracker');
    XLSX.writeFile(wb, 'Delivery_and_Project_Reminder_Tracker.xlsx');
    setToast('Excel file exported!');
  };

  /* ---- Export CSV ---- */
  const exportCSV = () => {
    const headers = ['Category', 'Task / Item', 'Source', 'Start Date', 'Due / Arrival Date', 'Time Zone', 'Status', 'Priority', 'Days Left', 'Reminder Level', 'Notes'];
    const rows = processedData.map(d => [
      `"${d.category}"`, `"${d.task}"`, `"${d.source}"`, `"${formatDateDisplay(d.startDate)}"`, `"${formatDateDisplay(d.dueDate)}"`,
      `"${d.timeZone}"`, `"${d.status}"`, `"${d.priority}"`, d.daysLeft, `"${d.reminderLevel}"`, `"${d.notes}"`
    ]);
    const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows.map(e => e.join(','))].join("\n");
    const link = document.createElement("a");
    link.setAttribute("href", encodeURI(csvContent));
    link.setAttribute("download", "Delivery_and_Project_Tracker.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setToast('CSV file exported!');
  };

  return (
    <div className="min-h-screen bg-slate-100 text-slate-800 font-sans p-4 md:p-6">
      <div className="max-w-7xl mx-auto space-y-6">

        {/* Header & Navigation */}
        <div className="bg-white rounded-xl shadow-sm p-4 flex flex-col md:flex-row justify-between items-center gap-4 border border-slate-200">
          <div>
            <h1 className="text-2xl font-bold" style={{color: 'rgb(67, 75, 81)'}}>BRIDGE Planner</h1>
            <p className="text-sm text-slate-500">Emirates Time | Today: {todayStr}</p>
          </div>
          <div className="flex gap-2 flex-wrap justify-center">
            {['dashboard', 'tracker', 'calendar'].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 rounded-lg font-medium transition-colors capitalize ${activeTab === tab ? 'bg-[#ff5622] text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}>
                {tab}
              </button>
            ))}
          </div>
        </div>

        {/* --- DASHBOARD TAB --- */}
        {activeTab === 'dashboard' && (
          <div className="space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              {[
                { label: 'Total Tasks', value: processedData.length, bg: 'bg-[#fff0eb]', fg: 'text-[#ff5622]', icon: '\u2630' },
                { label: 'Due This Week', value: processedData.filter(d => d.daysLeft >= 0 && d.daysLeft <= 7).length, bg: 'bg-orange-100', fg: 'text-orange-600', icon: '\u23F0' },
                { label: 'Overdue / Urgent', value: processedData.filter(d => d.reminderLevel === 'Urgent' || d.reminderLevel === 'Overdue').length, bg: 'bg-red-100', fg: 'text-red-600', icon: '\u26A0' },
                { label: 'Deliveries Coming', value: processedData.filter(d => d.category === 'Amazon Delivery').length, bg: 'bg-blue-100', fg: 'text-blue-600', icon: '\uD83D\uDCE6' },
              ].map(card => (
                <div key={card.label} className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                  <div className={`${card.bg} p-3 rounded-lg ${card.fg} text-2xl`}>{card.icon}</div>
                  <div>
                    <p className="text-sm font-medium text-slate-500">{card.label}</p>
                    <p className="text-2xl font-bold text-slate-900">{card.value}</p>
                  </div>
                </div>
              ))}
            </div>

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
              <h2 className="text-lg font-bold mb-4">Important Project Deadlines</h2>
              <div className="space-y-3">
                {processedData.filter(d => d.category === 'Project').map(p => (
                  <div key={p.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-lg border border-slate-100">
                    <div>
                      <h3 className="font-semibold text-slate-800">{p.task}</h3>
                      <p className="text-sm text-slate-500">Due: {formatDateDisplay(p.dueDate)}</p>
                    </div>
                    <span className="px-3 py-1 bg-red-100 text-red-800 text-xs font-bold rounded-full uppercase tracking-wide">{p.priority}</span>
                  </div>
                ))}
                {processedData.filter(d => d.category === 'Project').length === 0 && (
                  <p className="text-slate-400 text-sm text-center py-4">No project tasks yet.</p>
                )}
              </div>
            </div>
          </div>
        )}

        {/* --- TRACKER TAB --- */}
        {activeTab === 'tracker' && (
          <div className="flex flex-col lg:flex-row gap-6">
            <div className="flex-grow bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">

              {/* Toolbar */}
              <div className="p-4 border-b border-slate-200 flex flex-wrap justify-between items-center bg-slate-50 gap-3">
                <div className="flex items-center gap-2">
                  <span className="text-sm font-medium text-slate-600">Filter:</span>
                  <select value={filterCategory} onChange={e => setFilterCategory(e.target.value)} className="border border-slate-300 rounded-md py-1 px-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#ff5622]">
                    {categories.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div className="flex items-center gap-2 flex-wrap">
                  <button onClick={() => setModal('add')} className="flex items-center gap-1.5 text-sm font-medium text-white bg-[#ff5622] hover:bg-[#e04d1e] px-3 py-1.5 rounded-md transition-colors">
                    + Add Task
                  </button>
                  <button onClick={exportExcel} className="flex items-center gap-1.5 text-sm font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 px-3 py-1.5 rounded-md transition-colors">
                    Export Excel
                  </button>
                  <button onClick={exportCSV} className="flex items-center gap-1.5 text-sm font-medium text-[#ff5622] bg-[#fff5f0] hover:bg-[#fff0eb] px-3 py-1.5 rounded-md transition-colors">
                    Export CSV
                  </button>
                  <button onClick={resetToDefaults} className="flex items-center gap-1.5 text-sm font-medium text-slate-500 bg-white border border-slate-300 hover:bg-slate-100 px-3 py-1.5 rounded-md transition-colors">
                    Reset
                  </button>
                </div>
              </div>

              {/* Table */}
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left whitespace-nowrap">
                  <thead className="bg-[#434B51] text-white sticky top-0 z-10 shadow-sm">
                    <tr>
                      <th className="p-3 font-semibold">Category</th>
                      <th className="p-3 font-semibold min-w-[250px]">Task / Item</th>
                      <th className="p-3 font-semibold">Source</th>
                      <th className="p-3 font-semibold">Start Date</th>
                      <th className="p-3 font-semibold">Due Date</th>
                      <th className="p-3 font-semibold">Status</th>
                      <th className="p-3 font-semibold">Priority</th>
                      <th className="p-3 font-semibold text-center">Days Left</th>
                      <th className="p-3 font-semibold">Reminder</th>
                      <th className="p-3 font-semibold">Notes</th>
                      <th className="p-3 font-semibold text-center">Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredData.length === 0 && (
                      <tr><td colSpan={11} className="p-8 text-center text-slate-400">No tasks found. Click "Add Task" to get started.</td></tr>
                    )}
                    {filteredData.map(row => (
                      <tr key={row.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors group">
                        <td className="p-3">
                          <span className={`px-2 py-1 rounded text-xs font-medium ${row.category === 'Amazon Delivery' ? 'bg-blue-100 text-blue-800' : row.category === 'Project' ? 'bg-[#fff0eb] text-[#ff5622]' : 'bg-slate-100 text-slate-800'}`}>
                            {row.category}
                          </span>
                        </td>
                        <td className="p-3 whitespace-normal min-w-[250px] font-medium text-slate-700">{row.task}</td>
                        <td className="p-3 text-slate-600">{row.source}</td>
                        <td className="p-3 text-slate-600">{formatDateDisplay(row.startDate)}</td>
                        <td className="p-3 font-medium">{formatDateDisplay(row.dueDate)}</td>
                        <td className="p-3">
                          <span className="text-xs font-medium px-2 py-1 rounded" style={{ backgroundColor: statusColors[row.status]?.bg, color: statusColors[row.status]?.text, border: `1px solid ${statusColors[row.status]?.border}` }}>{row.status}</span>
                        </td>
                        <td className="p-3">
                          <span className="text-xs font-bold px-2 py-1 rounded" style={{ backgroundColor: priorityColors[row.priority]?.bg, color: priorityColors[row.priority]?.text, border: `1px solid ${priorityColors[row.priority]?.border}` }}>{row.priority}</span>
                        </td>
                        <td className={`p-3 text-center font-bold text-base ${row.formatColor}`}>
                          {row.daysLeft}
                        </td>
                        <td className="p-3">
                          <span className={`px-2 py-1 rounded text-xs font-bold ${row.badgeColor}`}>{row.reminderLevel}</span>
                        </td>
                        <td className="p-3 text-slate-500 whitespace-normal min-w-[180px] text-xs">{row.notes}</td>
                        <td className="p-3 text-center">
                          <div className="flex items-center justify-center gap-1 opacity-60 group-hover:opacity-100 transition-opacity">
                            <button onClick={() => setModal(row)} className="p-1.5 rounded hover:bg-[#fff0eb] text-[#ff5622] transition-colors" title="Edit">
                              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                            </button>
                            <button onClick={() => setDeleteTarget(row)} className="p-1.5 rounded hover:bg-red-100 text-red-500 transition-colors" title="Delete">
                              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Legend Panel */}
            <div className="w-full lg:w-64 flex-shrink-0 bg-white rounded-xl shadow-sm border border-slate-200 p-5 h-fit space-y-5">
              <div>
                <h3 className="font-bold text-slate-900 mb-4 border-b pb-2">Color Legend</h3>
                <div className="space-y-4 text-sm">
                  <div>
                    <p className="font-semibold text-slate-700 mb-2">Reminder Levels</p>
                    <ul className="space-y-2">
                      <li className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-red-500 inline-block"></span> Overdue / Urgent</li>
                      <li className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-orange-400 inline-block"></span> Soon (3 days or less)</li>
                      <li className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-yellow-300 inline-block"></span> Upcoming (7 days or less)</li>
                      <li className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-green-400 inline-block"></span> On Track</li>
                      <li className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-emerald-400 inline-block"></span> Completed</li>
                    </ul>
                  </div>
                  <div className="pt-2 border-t">
                    <p className="font-semibold text-slate-700 mb-2">Categories</p>
                    <ul className="space-y-2">
                      <li><span className="px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">Amazon Delivery</span></li>
                      <li><span className="px-2 py-0.5 rounded text-xs font-medium bg-[#fff0eb] text-[#ff5622]">Project</span></li>
                      <li><span className="px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-800">Other</span></li>
                    </ul>
                  </div>
                </div>
              </div>
              <div className="border-t pt-4">
                <p className="text-xs text-slate-400">Data is saved in your browser automatically. Use Export to download.</p>
              </div>
            </div>
          </div>
        )}

        {/* --- CALENDAR TAB --- */}
        {activeTab === 'calendar' && (
          <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
            <h2 className="text-xl font-bold mb-6 text-slate-800">Schedule View</h2>
            <div className="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
              {Object.entries(processedData.reduce((acc, item) => {
                const d = formatDateDisplay(item.dueDate);
                if (!acc[d]) acc[d] = [];
                acc[d].push(item);
                return acc;
              }, {})).sort((a, b) => new Date(a[1][0].dueDate) - new Date(b[1][0].dueDate)).map(([date, items]) => (
                <div key={date} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                  <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-[#ff5622] text-white font-bold shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 shadow-md z-10 text-sm">
                    &#128197;
                  </div>
                  <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-4 rounded-xl shadow-sm border border-slate-200 bg-slate-50">
                    <h3 className="font-bold text-lg text-[#ff5622] mb-3">{date}</h3>
                    <div className="space-y-3">
                      {items.map(item => (
                        <div key={item.id} className="p-3 bg-white border border-slate-100 rounded-lg shadow-sm">
                          <div className="flex justify-between items-start mb-1">
                            <span className={`px-2 py-0.5 text-[10px] rounded uppercase font-bold tracking-wider ${item.category === 'Amazon Delivery' ? 'bg-blue-100 text-blue-800' : item.category === 'Project' ? 'bg-[#fff0eb] text-[#ff5622]' : 'bg-slate-200 text-slate-700'}`}>
                              {item.category}
                            </span>
                            <span className={`text-[10px] px-2 py-0.5 rounded font-bold ${item.badgeColor}`}>{item.reminderLevel}</span>
                          </div>
                          <p className="text-sm font-medium text-slate-800 leading-snug">{item.task}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>

      {/* Modals */}
      {modal === 'add' && <TaskModal task={null} onSave={addTask} onClose={() => setModal(null)} />}
      {modal && modal !== 'add' && <TaskModal task={modal} onSave={updateTask} onClose={() => setModal(null)} />}
      {deleteTarget && <DeleteModal taskName={deleteTarget.task} onConfirm={() => deleteTask(deleteTarget.id)} onClose={() => setDeleteTarget(null)} />}
      {toast && <Toast message={toast} onDone={() => setToast('')} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
